<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexyComb - Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">

    <style>
        #unity-container {
            width: 295px;
            height: 639px;
            margin: 0 auto;
            background: black;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="/signup">Sign Up</a>
        <a href="/login">Login</a>
        <a href="/play">Play</a>
        <a href="/documentation">Documentation</a>
    </nav>

    <!-- Unity WebGL Canvas Container -->
     <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
     </div>

     <!-- React Root -->
      <div id="app"></div>

      <!-- Unity Loader -->
       <script src="/UnityLoader.js"></script>

       <script>
            createUnityInstance(document.querySelector("#unity-canvas"), {
                dataUrl: "Build/HexyComb-WebBuild.data",
                frameworkUrl: "Build/HexyComb-WebBuild.framework.js",
                codeUrl: "Build/HexyComb-WebBuild.wasm",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "HexyComb",
                productName: "HexyComb",
                productVersion: "1.0",
            });
        </script>

       <!-- React Game Bundle -->
        <script src="/appBundle.js"></script>
</body>
</html>
